# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false               # disable fun formatting for serious code review
  review_status: true
  review_details: true      # enable detailed line comments
  auto_review:
    enabled: true
    drafts: false

# Include instructions for Dart/Flutter analysis
instructions:
  prompt: |
    This PR contains Dart/Flutter code. Please review thoroughly focusing on:
      - Widget tree structure and rebuilds
      - State management (Bloc, Provider, Riverpod)
      - UI/UX logic correctness
      - Null safety and runtime errors
      - Async/await usage
      - Performance optimization (ListView/GridView, unnecessary rebuilds)
      - Dart best practices (naming, readability)
      - Detect unused/redundant code
      - Platform-specific issues (iOS/Android)
  summary: true
  actionable_comments: true
  concise_explanation: true
  recommend_best_practices: true
  context_sensitive: true

chat:
  auto_reply: true