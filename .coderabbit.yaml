# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: false

  # 🔥 THIS is where Flutter/Dart intelligence goes
  instructions: |
    This PR contains Dart and Flutter code. Review thoroughly and provide actionable feedback.

    Focus on:
    - Widget tree structure and unnecessary rebuilds
    - State management (Bloc, Provider, Riverpod)
    - UI/UX logic correctness
    - Null safety issues and runtime risks
    - Async/await and Future handling
    - Performance issues (ListView, rebuilds, heavy widgets)
    - Duplicate and redundant code
    - Dart best practices (naming, readability, maintainability)
    - Platform-specific issues (Android/iOS)
    - Deprecated Flutter/Dart APIs
    - Security issues (API keys, secrets)
    - Error handling and exception safety
    - Test coverage (unit/widget tests)

    Provide:
    - Line-level comments
    - Severity (Critical / Warning / Suggestion)
    - Clear improvement suggestions

chat:
  auto_reply: true