name: Manual PR Compare (Python)

on:
  workflow_dispatch:
    inputs:
      master_pr:
        description: "Master PR number"
        required: true
      qa_prs:
        description: "QA PR numbers (comma-separated, e.g., 12,13,14)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  compare:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install PyGithub

      - name: Run PR comparison script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MASTER_PR: ${{ github.event.inputs.master_pr }}
          QA_PRS: ${{ github.event.inputs.qa_prs }}
        run: |
          import os
          from github import Github

          # Initialize GitHub client
          g = Github(os.environ["GITHUB_TOKEN"])
          repo = g.get_repo(os.environ["GITHUB_REPOSITORY"])

          master_pr = repo.get_pull(int(os.environ["MASTER_PR"]))
          qa_prs = [repo.get_pull(int(pr.strip())) for pr in os.environ["QA_PRS"].split(",")]

          def collect_files(pr):
              files = {}
              for f in pr.get_files():
                  files[f.filename] = (f.additions, f.deletions)
              return files

          # Collect MASTER PR files
          master_files = collect_files(master_pr)

          # Combine QA PR files
          qa_files = {}
          for pr in qa_prs:
              for filename, stats in collect_files(pr).items():
                  if filename in qa_files:
                      qa_files[filename] = (qa_files[filename][0]+stats[0], qa_files[filename][1]+stats[1])
                  else:
                      qa_files[filename] = stats

          # Create Markdown report
          all_files = set(master_files.keys()) | set(qa_files.keys())
          with open("report.md", "w") as f:
              f.write("| File | MASTER | QA | Status |\n")
              f.write("|------|--------|----|--------|\n")
              for file in sorted(all_files):
                  m = master_files.get(file, ("Missing","Missing"))
                  q = qa_files.get(file, ("Missing","Missing"))

                  m_str = f"+{m[0]} -{m[1]}" if m != ("Missing","Missing") else "Missing"
                  q_str = f"+{q[0]} -{q[1]}" if q != ("Missing","Missing") else "Missing"

                  if m_str == q_str and m_str != "Missing":
                      status = "OK"
                  elif m_str == "Missing":
                      status = "MISSING_IN_MASTER"
                  elif q_str == "Missing":
                      status = "MISSING_IN_QA"
                  else:
                      status = "DIFF_MISMATCH"

                  f.write(f"| {file} | {m_str} | {q_str} | {status} |\n")

      - name: Upload Markdown report
        uses: actions/upload-artifact@v4
        with:
          name: pr-comparison-report
          path: report.md
