name: Manual PR Compare (MASTER vs QA PRs)

on:
  workflow_dispatch:
    inputs:
      master_pr:
        description: "Master PR number"
        required: true
      qa_prs:
        description: "QA PR numbers (comma-separated, e.g., 12,13,14)"
        required: true

jobs:
  compare:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # avoids Node 20 warning

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Authenticate GH CLI
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate MASTER PR diff
        run: |
          gh pr diff ${{ github.event.inputs.master_pr }} --numstat > master.txt || echo "" > master.txt

      - name: Generate QA PRs diff (combined)
        run: |
          > qa.txt
          IFS=',' read -ra PRS <<< "${{ github.event.inputs.qa_prs }}"
          for pr in "${PRS[@]}"; do
            gh pr diff $pr --numstat >> qa.txt || echo "" >> qa.txt
          done

      - name: Generate Markdown report
        run: |
          set -e
          echo "| File | MASTER | QA | Status |" > report.md
          echo "|------|--------|----|--------|" >> report.md

          # Collect all unique files
          awk '{print $3}' master.txt qa.txt | sort | uniq > files.txt

          while read file; do
            m=$(grep -F "$file" master.txt || true)
            q=$(grep -F "$file" qa.txt || true)

            if [ -n "$m" ]; then
              m_stat="+$(echo $m | awk '{print $1}') -$(echo $m | awk '{print $2}')"
            else
              m_stat="Missing"
            fi

            if [ -n "$q" ]; then
              q_add=$(grep -F "$file" qa.txt | awk '{sum+=$1} END {print sum}')
              q_del=$(grep -F "$file" qa.txt | awk '{sum+=$2} END {print sum}')
              q_stat="+${q_add:-0} -${q_del:-0}"
            else
              q_stat="Missing"
            fi

            # Determine status
            if [[ "$m_stat" == "$q_stat" && "$m_stat" != "Missing" ]]; then
              status="OK"
            elif [[ "$m_stat" == "Missing" ]]; then
              status="MISSING_IN_MASTER"
            elif [[ "$q_stat" == "Missing" ]]; then
              status="MISSING_IN_QA"
            else
              status="DIFF_MISMATCH"
            fi

            echo "| $file | $m_stat | $q_stat | $status |" >> report.md
          done < files.txt

      - name: Upload Markdown report
        uses: actions/upload-artifact@v4
        with:
          name: pr-comparison-report
          path: report.md
